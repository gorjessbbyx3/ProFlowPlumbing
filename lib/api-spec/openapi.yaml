    post:
      operationId: uploadBookingPhoto
      tags: [bookings]
      summary: Upload a photo for a booking
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photo:
                  type: string
                  format: binary
                type:
                  type: string
                  enum: [before, after]
                caption:
                  type: string
              required: [photo, type]
      responses:
        "201":
          description: Photo uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingPhoto"

