      operationId: getTaxSummary
      tags: [reports]
      summary: Get tax summary report
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
        - name: endDate
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tax summary data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxSummary"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [reports]
      summary: Get dashboard overview stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

