openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Plumbing CRM CRM & Business Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: employees
    description: Employee management
  - name: shifts
    description: Employee shift scheduling
  - name: clients
    description: Client management
  - name: bookings
    description: Booking/Job management
  - name: invoices
    description: Invoice management
  - name: receipts
    description: Receipt management
  - name: expenses
    description: Expense tracking
  - name: labor
    description: Labor entry tracking
  - name: todos
    description: To-do list
  - name: followups
    description: Follow-up list
  - name: campaigns
    description: Campaign management
  - name: checklist
    description: New business checklist
  - name: reports
    description: Tax reports

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List all employees
      responses:
