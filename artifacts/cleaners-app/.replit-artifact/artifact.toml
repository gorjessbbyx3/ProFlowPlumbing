kind = "web"
previewPath = "/"
title = "808 All Purpose Cleaners"
version = "1.0.0"
id = "artifacts/cleaners-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22840
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/cleaners-app run dev"

[services.env]
PORT = "22840"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/cleaners-app", "run", "build"]
publicDir = "artifacts/cleaners-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
